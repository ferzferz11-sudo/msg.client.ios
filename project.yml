name: LavenderMessenger
options:
  bundleIdPrefix: com.lavender
  deploymentTarget:
    iOS: "18.0"
  developmentRegion: en

packages:
  grpc-swift:
    url: https://github.com/grpc/grpc-swift.git
    from: "2.0.0"
  grpc-swift-nio-transport:
    url: https://github.com/grpc/grpc-swift-nio-transport.git
    from: "1.0.0"
  grpc-swift-protobuf:
    url: https://github.com/grpc/grpc-swift-protobuf.git
    from: "1.0.0"
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"

targets:
  LavenderMessenger:
    type: application
    platform: iOS
    sources:
      - LavenderMessengerApp.swift
      - path: Sources/LavenderMessengerLib
    dependencies:
      - package: grpc-swift
        product: GRPCCore
      - package: grpc-swift-nio-transport
        product: GRPCNIOTransportHTTP2Posix
      - package: grpc-swift-protobuf
        product: GRPCProtobuf
      - package: swift-protobuf
        product: SwiftProtobuf
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: "com.lavender.LavenderMessenger"
        CODE_SIGN_STYLE: "Automatic"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - Assets.xcassets
