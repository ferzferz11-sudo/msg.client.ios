name: LavenderMessenger
options:
  bundleIdPrefix: com.lavender
  deploymentTarget:
    iOS: "17.0"
  developmentRegion: en

packages:
  grpc-swift:
    url: https://github.com/grpc/grpc-swift.git
    from: "2.1.0"
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: "2.70.0"

targets:
  LavenderMessenger:
    type: application
    platform: iOS
    sources:
      - LavenderMessengerApp.swift
      - path: Sources/LavenderMessengerLib
        excludes:
          - LavenderMessengerApp.swift
    dependencies:
      - package: grpc-swift
        product: GRPCCore
      - package: swift-protobuf
        product: SwiftProtobuf
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
    settings:
      base:
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
